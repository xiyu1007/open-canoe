# ---------------------------------------------------------------------------
# Canoe — User Settings
# Edit values below. Missing keys fall back to defaults in this file.
# ---------------------------------------------------------------------------

transport:
  preferred: usb_cdc
  serial_baud: 115200
  auto_connect: false
  vid: 0x0483
  pid: 0x5740

can:
  bitrate: 500000
  silent_mode: false

ui:
  theme: light
  max_log_lines: 100000
  message_limit: 2000      # max in-memory messages; oldest half offloaded to CSV when exceeded
